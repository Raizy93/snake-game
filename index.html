<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klassieke Snake</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #c9e9ff, #eaf6ff 65%);
        color: #11324a;
        background: radial-gradient(circle at top, #1f3a37, #0c1413 65%);
        color: #ecfdf3;
        padding: max(0.9rem, env(safe-area-inset-top))
          max(0.9rem, env(safe-area-inset-right))
          max(0.9rem, env(safe-area-inset-bottom))
          max(0.9rem, env(safe-area-inset-left));
      }

      .game-shell {
        width: min(94vw, 560px);
        padding: 1rem;
        border-radius: 16px;
        background: rgba(235, 247, 255, 0.9);
        border: 1px solid rgba(90, 153, 201, 0.35);
      }

      .game-shell {
        width: min(92vw, 560px);
        padding: 1.25rem;
        border-radius: 16px;
        background: rgba(7, 16, 14, 0.85);
        border: 1px solid rgba(109, 226, 175, 0.28);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0;
        text-align: center;
        letter-spacing: 0.06em;
      }

      .hud {
        margin: 0.85rem 0 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .stats {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .pill {
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(90, 153, 201, 0.42);
        background: rgba(90, 153, 201, 0.16);
        border: 1px solid rgba(109, 226, 175, 0.34);
        background: rgba(109, 226, 175, 0.12);
        font-size: 0.95rem;
      }

      button,
      select {
        border: none;
        padding: 0.55rem 0.95rem;
        border-radius: 10px;
        background: #7ec8ff;
        color: #10324b;
      button {
        border: none;
        padding: 0.55rem 0.95rem;
        border-radius: 10px;
        background: #6de2af;
        color: #08301f;
        font-weight: 700;
        cursor: pointer;
      }

      select {
        background: rgba(235, 247, 255, 0.9);
        color: #11324a;
        border: 1px solid rgba(90, 153, 201, 0.7);
        background: rgba(7, 16, 14, 0.85);
        color: #ecfdf3;
        border: 1px solid rgba(109, 226, 175, 0.6);
        padding: 0.2rem 0.35rem;
        border-radius: 6px;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .board-wrap {
        position: relative;
      }

      canvas {
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1;
        display: block;
        margin: 0 auto;
        background: #dff1ff;
        border: 3px solid #5a99c9;
        background: #102220;
        border: 3px solid #2f6b54;
        border-radius: 12px;
        touch-action: none;
      }

      .help {
        margin-top: 0.9rem;
        text-align: center;
        font-size: 0.92rem;
        color: #4e7694;
        color: #b8d8c8;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        border-radius: 12px;
        background: rgba(74, 121, 159, 0.22);
        background: rgba(0, 0, 0, 0.46);
        text-align: center;
        padding: 1rem;
      }

      .overlay.visible {
        display: grid;
      }

      .overlay p {
        margin: 0;
        font-size: clamp(1.1rem, 2.5vw, 1.4rem);
        font-weight: 700;
      }

      .touch-controls {
        margin: 1rem auto 0;
        width: min(270px, 100%);
        display: none;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.35rem;
      }

      .touch-btn {
        min-height: 54px;
        display: grid;
        place-items: center;
        font-size: 1.25rem;
        user-select: none;
        -webkit-user-select: none;
      }

      .touch-btn.empty {
        visibility: hidden;
      }

      .touch-btn:active {
        transform: scale(0.97);
      }

      @media (max-width: 720px), (pointer: coarse) {
        .game-shell {
          width: min(96vw, 540px);
          padding: 0.9rem;
        }

        .hud {
          justify-content: center;
        }

        .touch-controls {
          display: grid;
        }

        .help {
          font-size: 0.88rem;
        }
      .board-wrap {
        position: relative;
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <h1>Snake</h1>
      <section class="hud">
        <div class="stats">
          <span class="pill">Score: <strong id="score">0</strong></span>
          <span class="pill">Highscore: <strong id="high-score">0</strong></span>
          <label class="pill" for="speed-select"
            >Snelheid:
            <select id="speed-select" aria-label="Kies snelheid in fps">
              <option value="5">5 fps</option>
              <option value="8" selected>8 fps</option>
              <option value="10">10 fps</option>
            </select>
          </label>
              <option value="10">10 fps</option>
              <option value="30">30 fps</option>
              <option value="60">60 fps</option>
            </select>
          </label>
          <label class="pill" for="speed-select">Snelheid: <select id="speed-select" aria-label="Kies snelheid in fps"><option value="10">10 fps</option><option value="30">30 fps</option><option value="60">60 fps</option></select></label>
          <span class="pill">Snelheid: <strong id="speed">8</strong> fps</span>
        </div>
        <button id="restart" type="button">Opnieuw starten</button>
      </section>
      <div class="board-wrap">
        <canvas id="board" width="500" height="500" aria-label="Snake speelveld"></canvas>
        <div class="overlay visible" id="overlay">
          <p>Druk op een pijltoets/WASD of gebruik touch-controls om te starten</p>
        </div>
      </div>

      <section class="touch-controls" aria-label="Touch controls">
        <button class="touch-btn empty" type="button" tabindex="-1" aria-hidden="true">·</button>
        <button class="touch-btn" type="button" data-dir="up" aria-label="Omhoog">▲</button>
        <button class="touch-btn empty" type="button" tabindex="-1" aria-hidden="true">·</button>
        <button class="touch-btn" type="button" data-dir="left" aria-label="Links">◀</button>
        <button class="touch-btn" type="button" id="pause-btn" aria-label="Pauze">⏯</button>
        <button class="touch-btn" type="button" data-dir="right" aria-label="Rechts">▶</button>
        <button class="touch-btn empty" type="button" tabindex="-1" aria-hidden="true">·</button>
        <button class="touch-btn" type="button" data-dir="down" aria-label="Omlaag">▼</button>
        <button class="touch-btn empty" type="button" tabindex="-1" aria-hidden="true">·</button>
      </section>

      <p class="help">Besturing: pijltjestoetsen of WASD · Pauze met spatie of ⏯</p>
          <p>Druk op een pijltoets of WASD om te starten</p>
        </div>
      </div>
      <p class="help">Besturing: pijltjestoetsen of WASD · Spel pauzeert met spatie</p>
    </main>

    <script>
      const TILE_COUNT = 20;
      const SPEED_OPTIONS = [5, 8, 10];
      const SPEED_OPTIONS = [10, 30, 60];
      const BASE_SPEED = 8;
      const MAX_SPEED = 16;
      const board = document.getElementById('board');
      const ctx = board.getContext('2d');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('high-score');
      const speedSelect = document.getElementById('speed-select');
      const overlay = document.getElementById('overlay');
      const restartBtn = document.getElementById('restart');
      const pauseBtn = document.getElementById('pause-btn');
      const touchDirectionButtons = document.querySelectorAll('[data-dir]');
      const speedEl = document.getElementById('speed');
      const overlay = document.getElementById('overlay');
      const restartBtn = document.getElementById('restart');

      let snake;
      let direction;
      let pendingDirection;
      let food;
      let score;
      let highScore = Number(localStorage.getItem('snake-high-score') || 0);
      let gameOver;
      let gameStarted;
      let paused;
      let loopTimer;
      let selectedSpeed = Number(speedSelect.value);

      highScoreEl.textContent = String(highScore);
      highScoreEl.textContent = highScore;

      function randomPosition() {
        return {
          x: Math.floor(Math.random() * TILE_COUNT),
          y: Math.floor(Math.random() * TILE_COUNT),
        };
      }

      function positionsEqual(a, b) {
        return a.x === b.x && a.y === b.y;
      }

      function placeFood() {
        do {
          food = randomPosition();
        } while (snake.some((part) => positionsEqual(part, food)));
      }

      function updateBoardSize() {
        const displaySize = Math.floor(Math.min(board.clientWidth || 500, 500));
        if (board.width !== displaySize) {
          board.width = displaySize;
          board.height = displaySize;
          render();
        }
      }

      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 },
        ];
        direction = { x: 1, y: 0 };
        pendingDirection = { ...direction };
        score = 0;
        gameOver = false;
        gameStarted = false;
        paused = false;
        placeFood();
        updateBoardSize();
        render();
        scoreEl.textContent = '0';
        overlay.classList.add('visible');
        overlay.firstElementChild.textContent = 'Druk op een pijltoets/WASD of gebruik touch-controls om te starten';
        render();
        scoreEl.textContent = '0';
        speedEl.textContent = BASE_SPEED;
        overlay.classList.add('visible');
        overlay.firstElementChild.textContent = 'Druk op een pijltoets of WASD om te starten';
        clearInterval(loopTimer);
      }

      function setDirection(next) {
        if (next.x + direction.x === 0 && next.y + direction.y === 0) {
        if (
          next.x + direction.x === 0 &&
          next.y + direction.y === 0
        ) {
          return;
        }
        pendingDirection = next;
        if (!gameStarted) {
          startGameLoop();
        }
      }

      function speedForScore() {
        return Math.min(BASE_SPEED + Math.floor(score / 4), MAX_SPEED);
      }

      function startGameLoop() {
        if (gameOver) return;
        gameStarted = true;
        paused = false;
        overlay.classList.remove('visible');
        clearInterval(loopTimer);
        loopTimer = setInterval(tick, 1000 / selectedSpeed);
        loopTimer = setInterval(tick, 1000 / speedForScore());
      }

      function togglePause() {
        if (!gameStarted || gameOver) return;
        paused = !paused;
        if (paused) {
          clearInterval(loopTimer);
          overlay.classList.add('visible');
          overlay.firstElementChild.textContent = 'Gepauzeerd (druk spatie of ⏯ om door te gaan)';
          overlay.firstElementChild.textContent = 'Gepauzeerd (druk spatie om door te gaan)';
        } else {
          overlay.classList.remove('visible');
          startGameLoop();
        }
      }

      function tick() {
        direction = pendingDirection;
        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y,
        };

        const outOfBounds =
          head.x < 0 ||
          head.y < 0 ||
          head.x >= TILE_COUNT ||
          head.y >= TILE_COUNT;

        const hitSelf = snake.some((part) => positionsEqual(part, head));

        if (outOfBounds || hitSelf) {
          gameOver = true;
          clearInterval(loopTimer);
          overlay.classList.add('visible');
          overlay.firstElementChild.textContent = 'Game over! Druk op Opnieuw starten';
          return;
        }

        snake.unshift(head);

        if (positionsEqual(head, food)) {
          score += 1;
          scoreEl.textContent = String(score);
          placeFood();

          if (score > highScore) {
            highScore = score;
            highScoreEl.textContent = String(highScore);
            localStorage.setItem('snake-high-score', String(highScore));
          }

          const newSpeed = speedForScore();
          speedEl.textContent = String(newSpeed);
          clearInterval(loopTimer);
          loopTimer = setInterval(tick, 1000 / newSpeed);
        } else {
          snake.pop();
        }

        render();
      }

      function render() {
        const tileSize = board.width / TILE_COUNT;

        ctx.fillStyle = '#dff1ff';
        ctx.fillRect(0, 0, board.width, board.height);

        ctx.strokeStyle = 'rgba(46, 106, 148, 0.16)';
        ctx.fillStyle = '#102220';
        ctx.fillRect(0, 0, board.width, board.height);

        ctx.strokeStyle = 'rgba(236, 253, 243, 0.07)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= TILE_COUNT; i += 1) {
          const p = i * tileSize;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, board.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(board.width, p);
          ctx.stroke();
        }

        ctx.fillStyle = '#ff6b81';
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.roundRect(
          food.x * tileSize + 3,
          food.y * tileSize + 3,
          tileSize - 6,
          tileSize - 6,
          6
        );
        ctx.fill();

        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? '#2f7fc0' : '#5caee8';
          ctx.fillStyle = index === 0 ? '#6de2af' : '#2dc986';
          ctx.beginPath();
          ctx.roundRect(
            part.x * tileSize + 2,
            part.y * tileSize + 2,
            tileSize - 4,
            tileSize - 4,
            6
          );
          ctx.fill();
        });
      }

      window.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if (key === ' ' || key === 'spacebar') {
          event.preventDefault();
          togglePause();
          return;
        }

        const nextDirection = {
          arrowup: { x: 0, y: -1 },
          w: { x: 0, y: -1 },
          arrowdown: { x: 0, y: 1 },
          s: { x: 0, y: 1 },
          arrowleft: { x: -1, y: 0 },
          a: { x: -1, y: 0 },
          arrowright: { x: 1, y: 0 },
          d: { x: 1, y: 0 },
        }[key];

        if (nextDirection) {
          event.preventDefault();
          setDirection(nextDirection);
        }
      });

      const directionMap = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 },
      };

      touchDirectionButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const nextDirection = directionMap[button.dataset.dir];
          if (nextDirection) {
            setDirection(nextDirection);
          }
        });
      });

      pauseBtn.addEventListener('click', togglePause);

      speedSelect.addEventListener('change', () => {
        const nextSpeed = Number(speedSelect.value);
        if (!SPEED_OPTIONS.includes(nextSpeed)) {
          return;
        }
        selectedSpeed = nextSpeed;
        if (gameStarted && !paused && !gameOver) {
          clearInterval(loopTimer);
          loopTimer = setInterval(tick, 1000 / selectedSpeed);
        }
      });

      restartBtn.addEventListener('click', resetGame);
      window.addEventListener('resize', updateBoardSize);

      updateBoardSize();

      resetGame();
    </script>
  </body>
</html>
